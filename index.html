      margin-bottom: 1rem;
      background: #fff;
    }
    .history-img-circle {
      width: 100px;
      height: 100px;
      background-color: #8a8a8a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }
    .history-img-circle img {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
    }
    .history-divider {
      border-bottom: 2px solid #555;
      margin: 4px 0 8px 0;
    }
    .sub-stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 1rem;
      row-gap: 0.25rem;

      { id: '31603', 'name_zh-Hant': '火屬性傷害加成 (%)', 'name_zh-CN': '火属性伤害加成 (%)', name_en: 'Fire', mainValue: 750, subValue: null, main_pos:[5] },
      { id: '31703', 'name_zh-Hant': '冰屬性傷害加成 (%)', 'name_zh-CN': '冰属性伤害加成 (%)', name_en: 'Ice', mainValue: 750, subValue: null, main_pos:[5] },
      { id: '31503', 'name_zh-Hant': '物理屬性傷害加成 (%)', 'name_zh-CN': '物理属性伤害加成 (%)', name_en: 'Physic', mainValue: 750, subValue: null, main_pos:[5] }
    ];

    const discImages = {
      "310": "https://storage.moegirl.tw/moegirl/commons/3/3b/驱动盘_啄木鸟电音.png",
      "311": "https://storage.moegirl.tw/moegirl/commons/0/06/驱动盘_河豚电音.png",
      "312": "https://storage.moegirl.tw/moegirl/commons/2/26/驱动盘_震星迪斯科.png",
      "313": "https://storage.moegirl.tw/moegirl/commons/8/89/驱动盘_自由蓝调.png",
      "314": "https://storage.moegirl.tw/moegirl/commons/4/46/驱动盘_激素朋克.png",
      "315": "https://storage.moegirl.tw/moegirl/commons/7/77/驱动盘_灵魂摇滚.png",
      "316": "https://storage.moegirl.tw/moegirl/commons/5/51/驱动盘_摇摆爵士.png",
      "318": "https://storage.moegirl.tw/moegirl/commons/9/9e/驱动盘_混沌爵士.png",
      "319": "https://storage.moegirl.tw/moegirl/commons/8/8f/驱动盘_原始朋克.png",
      "322": "https://storage.moegirl.tw/moegirl/commons/5/56/驱动盘_炎狱重金属.png",
      "323": "https://storage.moegirl.tw/moegirl/commons/0/0d/驱动盘_混沌重金属.png",
      "324": "https://storage.moegirl.tw/moegirl/commons/a/a4/驱动盘_雷暴重金属.png",
      "325": "https://storage.moegirl.tw/moegirl/commons/e/e0/驱动盘_极地重金属.png",
      "326": "https://storage.moegirl.tw/moegirl/commons/5/54/驱动盘_獠牙重金属.png",
      "327": "https://storage.moegirl.tw/moegirl/commons/7/73/驱动盘_折枝剑歌.png",
      "328": "https://storage.moegirl.tw/moegirl/commons/c/cf/驱动盘_静听嘉音.png",
      "329": "https://storage.moegirl.tw/moegirl/commons/3/39/驱动盘_如影相随.png",
      "330": "https://storage.moegirl.tw/moegirl/commons/0/09/驱动盘_法厄同之歌.png",
      "331": "https://storage.moegirl.tw/moegirl/commons/0/05/驱动盘_云岿如我.png",
      "332": "https://storage.moegirl.tw/moegirl/commons/c/cc/驱动盘_山大王.png",
      "333": "https://storage.moegirl.tw/moegirl/commons/6/67/驱动盘_拂晓生花.png",
      "334": "https://storage.moegirl.tw/moegirl/commons/c/c2/驱动盘_月光骑士颂.png",
      "335": "https://storage.moegirl.tw/moegirl/commons/2/27/驱动盘_沧浪行歌.png",
      "336": "https://storage.moegirl.tw/moegirl/commons/1/18/驱动盘_流光咏叹.png",
      "337": "https://cdn.gachabase.net/prod/zzz/assets/8070883109952236990_272_14050658.webp",
      "338": "https://cdn.gachabase.net/prod/zzz/assets/8927972225216233150_272_14050658.webp"
    };

    let mainStatSelect;
    let subStatSelects;
    let currentFileContent = "";
    let historyRecords = [];
    
    // 全域語言狀態（相容舊版，如果是舊的 "zh" 則自動轉為 "zh-Hant"）
    let currentLang = localStorage.getItem('yoshunko_lang');
    if (!currentLang || currentLang === 'zh') {
      currentLang = 'zh-Hant';
    }

    // 全域計數器狀態（載入儲存的檔案編號）
    let savedCounter = localStorage.getItem('yoshunko_file_counter');
    let fileCounter = savedCounter ? parseInt(savedCounter) : 1;

    // === 初始化與語言更新邏輯 ===
    document.addEventListener('DOMContentLoaded', () => {
      mainStatSelect = document.getElementById('main-stat-select');
      subStatSelects = document.querySelectorAll('select[id^="sub-stat-select-"]');
      
      const langSwitcher = document.getElementById('lang-switcher');
      langSwitcher.value = currentLang;
      
      langSwitcher.addEventListener('change', (e) => {
        currentLang = e.target.value;
        localStorage.setItem('yoshunko_lang', currentLang);
        updateLanguageUI();
      });

      // 初始化計數器顯示
      counterInput.value = fileCounter;

      updateLanguageUI(); // 初次載入更新介面
      loadHistory(); 
    });

    function updateLanguageUI() {
      // 1. 更新純靜態文字
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[currentLang][key]) el.textContent = i18n[currentLang][key];
      });

      // 2. 更新 Placeholder
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (i18n[currentLang][key]) el.placeholder = i18n[currentLang][key];
      });

      // 3. 更新驅動盤下拉選單
      const discSel = document.getElementById("disc-select");
      Array.from(discSel.options).forEach(opt => {
        if (opt.value === "") opt.textContent = i18n[currentLang].discPlaceholder;
        else if (discNames[opt.value]) opt.textContent = discNames[opt.value][currentLang];
      });

      // 4. 更新階級與部位下拉選單的防呆文字
      const posSel = document.getElementById("position");
      if (posSel.options[0].value === "") posSel.options[0].textContent = i18n[currentLang].posPlaceholder;
      
      const rankSel = document.getElementById("rank");
      Array.from(rankSel.options).forEach(opt => {
        if(opt.value === "2") opt.textContent = i18n[currentLang].rankB;
        if(opt.value === "3") opt.textContent = i18n[currentLang].rankA;
        if(opt.value === "4") opt.textContent = i18n[currentLang].rankS;
      });

      // 5. 更新已生成的詞條下拉選單文字
      const updateStatSelect = (select, isMain) => {
        Array.from(select.options).forEach(opt => {
          if (opt.value === "") {
            opt.textContent = isMain ? i18n[currentLang].mainStatPlaceholder : i18n[currentLang].subStatPlaceholder;
          } else {
            const stat = stats.find(s => s.id === opt.value);
            if(stat) opt.textContent = stat[`name_${currentLang}`];
          }
        });
      };
      updateStatSelect(mainStatSelect, true);
      subStatSelects.forEach(sel => updateStatSelect(sel, false));

      // 6. 重新渲染歷史紀錄
      if(document.getElementById('view-history').style.display !== 'none') {
        renderHistory();
      }
    }

    const output = document.getElementById('output');
    const imageContainer = document.getElementById('disc-image-container');
    const imageElement = document.getElementById('disc-image');
    const counterInput = document.getElementById('counter-input');
    const resetCounterBtn = document.getElementById('reset-counter-btn');

    // === 彈出視窗 (Modal) 邏輯 ===
    const tutorialModal = document.getElementById('tutorial-modal');
    document.getElementById('tutorial-btn').addEventListener('click', () => tutorialModal.classList.add('is-active'));
    const closeModal = () => tutorialModal.classList.remove('is-active');
    document.getElementById('tutorial-modal-bg').addEventListener('click', closeModal);
    document.getElementById('tutorial-close-btn').addEventListener('click', closeModal);
    document.getElementById('tutorial-confirm-btn').addEventListener('click', closeModal);

    // === 分頁切換邏輯 ===
    const tabBuilderBtn = document.getElementById('tab-builder-btn');
    const tabHistoryBtn = document.getElementById('tab-history-btn');
    const viewBuilder = document.getElementById('view-builder');
    const viewHistory = document.getElementById('view-history');

    function switchTab(tabName) {
      if (tabName === 'builder') {
        tabBuilderBtn.classList.add('is-active');
        tabHistoryBtn.classList.remove('is-active');
        viewBuilder.style.display = 'block';
        viewHistory.style.display = 'none';
      } else {
        tabBuilderBtn.classList.remove('is-active');
        tabHistoryBtn.classList.add('is-active');
        viewBuilder.style.display = 'none';
        viewHistory.style.display = 'block';
        renderHistory(); 
      }
    }

    tabBuilderBtn.addEventListener('click', () => switchTab('builder'));
    tabHistoryBtn.addEventListener('click', () => switchTab('history'));

    // === 計數器與記憶邏輯 ===
    counterInput.addEventListener('input', (e) => {
      const val = parseInt(e.target.value);
      if (!isNaN(val) && val >= 1) {
        fileCounter = val;
        localStorage.setItem('yoshunko_file_counter', fileCounter);
      }
    });

    resetCounterBtn.addEventListener('click', () => {
      fileCounter = 1;
      counterInput.value = 1;
      localStorage.setItem('yoshunko_file_counter', fileCounter);
    });

    // === 表單互動邏輯 ===
    document.getElementById("disc-select").addEventListener("change", (event) => {
      const selectedValue = event.target.value;
      if (discImages[selectedValue]) {
        imageElement.src = discImages[selectedValue];
        imageContainer.style.display = "block";
      } else {
        imageContainer.style.display = "none";
      }
    });

    document.getElementById("position").addEventListener("change", (event) => {
      let mainStatOptions = `<option value="" disabled selected>${i18n[currentLang].mainStatPlaceholder}</option>`;
      stats.forEach(stat => {
        if (stat.mainValue === null) return;
        if (stat.main_pos.includes(parseInt(event.target.value))) {
          const option = document.createElement('option');
          option.value = stat.id;
          option.textContent = stat[`name_${currentLang}`];
          mainStatOptions += option.outerHTML;
        }
      });
      mainStatSelect.innerHTML = mainStatOptions;
      mainStatSelect.disabled = false;

      if (event.target.value === "1" || event.target.value === "2" || event.target.value === "3"){
        mainStatSelect.selectedIndex = 1;
        mainStatSelect.disabled = true;
      }

      let subStatOptions = `<option value="" disabled selected>${i18n[currentLang].subStatPlaceholder}</option>`;
      stats.forEach(stat => {
        if (stat.subValue === null) return;
        const option = document.createElement('option');
        option.value = stat.id;
        option.textContent = stat[`name_${currentLang}`];
        subStatOptions += option.outerHTML;
      });
      subStatSelects.forEach(select => {
        select.innerHTML = subStatOptions;
        select.selectedIndex = 0;
      });
    });

    // === 生成、儲存與下載邏輯 (合併為一) ===
    document.querySelector("#create-download-btn").addEventListener("click", () => {
      const discSelect = document.getElementById("disc-select");
      const positionSelect = document.getElementById("position");
      const rankSelect = document.getElementById("rank");

      if (discSelect.value === "" || positionSelect.value === "" || rankSelect.value === "" || mainStatSelect.value === "") {
        output.textContent = i18n[currentLang].errorEmpty;
        return;
      }

      const discId = parseInt(discSelect.value);
      const position = parseInt(positionSelect.value);
      const rank = parseInt(rankSelect.value);
      const id = parseInt(`${discId}${rank}${position}`);
      
      const mainStatId = mainStatSelect.value;
      const mainStat = stats.find(stat => stat.id === mainStatId);
      const mainStatBaseValue = mainStat.mainValue;

      const subStats = [];
      const uiSubStatsRecord = []; 
      let disc_sum = 0;

      for (let i = 1; i <= 4; i++) {
        const subStatId = document.getElementById(`sub-stat-select-${i}`).value;
        if (subStatId) {
          const subStatData = stats.find(stat => stat.id === subStatId);
          const inputValStr = document.getElementById(`sub-stat-value-${i}`).value;
          const userInputValue = inputValStr ? parseInt(inputValStr) : 0;
          const subStatValue = userInputValue + 1; 
          
          disc_sum += subStatValue;
          
          if (!isNaN(subStatValue)) {
            subStats.push({ key: parseInt(subStatId), base_value: subStatData.subValue, add_value: subStatValue });
            uiSubStatsRecord.push({ id: subStatId, inputVal: userInputValue });
          }
        }
      }

      if (disc_sum < 8 || disc_sum > 9){
        output.textContent = i18n[currentLang].errorSum;
        return;
      }

      const subStatIds = subStats.map(stat => stat.key);
      const uniqueSubStatIds = new Set(subStatIds);
      if (uniqueSubStatIds.size !== subStatIds.length) {
        output.textContent = i18n[currentLang].errorDup;
        return;
      }

      const disc = {
        id, level: 15, exp: 0, star: 1, lock: false,
        properties: [{ key: parseInt(mainStatId), base_value: mainStatBaseValue, add_value: 0 }],
        sub_properties: subStats
      };

      const zonData = ZON.stringify(disc, null, 4);
      output.textContent = `${zonData}`;

      // 儲存至歷史紀錄
      const newRecord = {
        timestamp: new Date().getTime(),
        discId: discSelect.value,
        rank: rankSelect.value,
        position: positionSelect.value,
        mainStatId: mainStatId,
        subStats: uiSubStatsRecord,
        zonData: zonData 
      };
      saveToHistory(newRecord);

      // 直接觸發下載
      const blob = new Blob([zonData], { type: "application/octet-stream" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileCounter.toString(); 
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      // 更新計數器並儲存
      fileCounter++;
      counterInput.value = fileCounter;
      localStorage.setItem('yoshunko_file_counter', fileCounter);
    });

    // === 歷史紀錄存取與渲染邏輯 ===
    function loadHistory() {
      const saved = localStorage.getItem('yoshunko_disc_history');
      if (saved) historyRecords = JSON.parse(saved);
    }

    function saveToHistory(record) {
      historyRecords.unshift(record);
      localStorage.setItem('yoshunko_disc_history', JSON.stringify(historyRecords));
    }

    document.getElementById('clear-history-btn').addEventListener('click', () => {
      if(confirm(i18n[currentLang].confirmClear)) {
        historyRecords = [];
        localStorage.removeItem('yoshunko_disc_history');
        renderHistory();
      }
    });

    function renderHistory() {
      const container = document.getElementById('history-container');
      container.innerHTML = '';

      if (historyRecords.length === 0) {
        container.innerHTML = `<p class="has-text-centered has-text-grey">${i18n[currentLang].emptyHistory}</p>`;
        return;
      }

      historyRecords.forEach((record, index) => {
        const imgSrc = discImages[record.discId] || 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
        
        // 動態取得翻譯後的名稱
        const localizedDiscName = discNames[record.discId] ? discNames[record.discId][currentLang] : "Unknown";
        const mainStatData = stats.find(s => s.id === record.mainStatId);
        const localizedMainStat = mainStatData ? mainStatData[`name_${currentLang}`] : "Unknown";
        
        let displayRank = i18n[currentLang].rankB;
        if (record.rank === "3") displayRank = i18n[currentLang].rankA;
        if (record.rank === "4") displayRank = i18n[currentLang].rankS;

        let subStatsHtml = '';
        record.subStats.forEach(sub => {
          const sData = stats.find(s => s.id === sub.id);
          const localizedSub = sData ? sData[`name_${currentLang}`] : "Unknown";
          subStatsHtml += `<div><span class="is-size-6">${localizedSub} : ${sub.inputVal}</span></div>`;
        });

        const cardHtml = `
          <div class="history-card">
            <div class="columns is-mobile is-vcentered">
              <div class="column is-narrow">
                <div class="history-img-circle">
                  <img src="${imgSrc}" alt="${localizedDiscName}">
                </div>
              </div>
              <div class="column">
                <div class="is-flex is-justify-content-space-between is-align-items-flex-end">
                  <span class="is-size-4 has-text-weight-bold">${localizedDiscName}</span>
                  <span class="is-size-6 has-text-weight-semibold">${record.position} ${i18n[currentLang].posUnit}</span>
                </div>
                <div class="history-divider"></div>
                <div class="mb-2 is-flex is-align-items-center">
                  <span class="is-size-5 has-text-weight-medium">${localizedMainStat}</span>
                  <span class="tag is-warning is-light ml-3">${displayRank}</span>
                </div>
                <div class="history-divider"></div>
                <div class="sub-stat-grid">
                  ${subStatsHtml}
                </div>
                <div class="mt-3 has-text-right">
                  <button class="button is-small is-info direct-download-btn" data-index="${index}">${i18n[currentLang].directDownload}</button>
                  <button class="button is-small is-primary is-outlined apply-btn" data-index="${index}">${i18n[currentLang].applyBtn}</button>
                  <button class="button is-small is-danger is-outlined delete-btn" data-index="${index}">${i18n[currentLang].deleteBtn}</button>
                </div>
              </div>
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHtml);
      });

      document.querySelectorAll('.direct-download-btn').forEach(btn => {
        btn.addEventListener('click', (e) => directDownloadRecord(e.target.getAttribute('data-index')));
      });
      document.querySelectorAll('.apply-btn').forEach(btn => {
        btn.addEventListener('click', (e) => applyRecord(e.target.getAttribute('data-index')));
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => deleteRecord(e.target.getAttribute('data-index')));
      });
    }

    function directDownloadRecord(index) {
      const record = historyRecords[index];
      if (!record.zonData) {
        alert(i18n[currentLang].oldRecordAlert);
        return;
      }
      const blob = new Blob([record.zonData], { type: "application/octet-stream" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileCounter.toString(); 
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      fileCounter++;
      counterInput.value = fileCounter;
      localStorage.setItem('yoshunko_file_counter', fileCounter);
    }

    function deleteRecord(index) {
      historyRecords.splice(index, 1);
      localStorage.setItem('yoshunko_disc_history', JSON.stringify(historyRecords));
      renderHistory();
    }

    function applyRecord(index) {
      const record = historyRecords[index];
      switchTab('builder');

      const discSelect = document.getElementById("disc-select");
      discSelect.value = record.discId;
      discSelect.dispatchEvent(new Event('change'));

      document.getElementById("rank").value = record.rank;

      const posSelect = document.getElementById("position");
      posSelect.value = record.position;
      posSelect.dispatchEvent(new Event('change'));

      document.getElementById("main-stat-select").value = record.mainStatId;

      for (let i = 1; i <= 4; i++) {
        document.getElementById(`sub-stat-select-${i}`).selectedIndex = 0;
        document.getElementById(`sub-stat-value-${i}`).value = '';
      }

      record.subStats.forEach((sub, i) => {
        const fieldIndex = i + 1;
        document.getElementById(`sub-stat-select-${fieldIndex}`).value = sub.id;
        document.getElementById(`sub-stat-value-${fieldIndex}`).value = sub.inputVal;
      });

      output.textContent = i18n[currentLang].successApply;
    }

    // === 重置面板 ===
    document.getElementById("reset-button").addEventListener("click", () => {
      document.getElementById("disc-select").selectedIndex = 0;
      document.getElementById("position").selectedIndex = 0;
      document.getElementById("rank").selectedIndex = 2;
      imageContainer.style.display = "none";
      imageElement.src = "";
      mainStatSelect.innerHTML = `<option value="" disabled selected>${i18n[currentLang].mainStatPlaceholder}</option>`;
      mainStatSelect.disabled = true;
      subStatSelects.forEach(select => {
        select.innerHTML = `<option value="" disabled selected>${i18n[currentLang].subStatPlaceholder}</option>`;
        select.selectedIndex = 0;
      });
      document.getElementById("main-stat-value").value = '';
      for (let i = 1; i <= 4; i++) {
        document.getElementById(`sub-stat-value-${i}`).value = '';
      }
      output.textContent = '';
    });
  </script>
</body>

</html>
